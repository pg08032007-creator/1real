<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Catch Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1e3c72, #2a5298);
  color: white;
  text-align: center;
}

#topo {
  padding: 20px;
  font-size: 22px;
  background: rgba(0,0,0,0.3);
}

#pokemon {
  font-size: 100px;
  margin-top: 50px;
}

#botoes {
  position: fixed;
  bottom: 30px;
  width: 100%;
}

button {
  border: none;
  border-radius: 50%;
  padding: 20px;
  margin: 10px;
  font-size: 20px;
  cursor: pointer;
}

#bola {
  background: red;
  color: white;
}

#berry {
  background: pink;
}
</style>
</head>

<body>

<div id="topo">??? / CP ???</div>

<div id="pokemon">❓</div>

<div id="botoes">
  <button id="berry" onclick="usarBerry()">🍓</button>
  <button id="bola" onclick="capturar()">⚪</button>
</div>

<script>
let pokemonAtual = null;
let chance = 0.5;

function spawn() {
  const lista = [
    {emoji:"🔥", nome:"Flamix"},
    {emoji:"💧", nome:"Aquari"},
    {emoji:"🌿", nome:"Leafy"}
  ];

  pokemonAtual = lista[Math.floor(Math.random()*lista.length)];
  document.getElementById("pokemon").innerText = pokemonAtual.emoji;
  document.getElementById("topo").innerText = pokemonAtual.nome + " / CP " + (Math.floor(Math.random()*2000)+100);
}

function usarBerry() {
  chance += 0.2;
  alert("Chance aumentada!");
}

function capturar() {
  if (!pokemonAtual) return;

  if (Math.random() < chance) {
    alert("Capturado!");
    spawn();
    chance = 0.5;
  } else {
    alert("Fugiu!");
  }
}

spawn();
</script>

</body>
</html>
