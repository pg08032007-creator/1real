<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Catch Game OK</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family: Arial;
  background: linear-gradient(#87CEEB, #4caf50);
}

/* 🌿 grama */
#grass {
  position:absolute;
  bottom:0;
  width:100%;
  height:150px;
  background: repeating-linear-gradient(
    45deg,
    #2e7d32,
    #2e7d32 10px,
    #388e3c 10px,
    #388e3c 20px
  );
  cursor:pointer;
}

/* tela encontro */
#encounter {
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  background: linear-gradient(#0a1a3a, #000);
}

/* canvas visível */
#canvas {
  display:block;
}

/* texto */
#info {
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  color:white;
  font-size:22px;
}

/* pokebola */
#ball {
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:70px;
  border-radius:50%;
  background: linear-gradient(red 50%, white 50%);
  border:4px solid black;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="grass"></div>

<div id="encounter">
  <canvas id="canvas"></canvas>
  <div id="info"></div>
  <div id="ball"></div>
</div>

<script>
const grass = document.getElementById("grass");
const encounter = document.getElementById("encounter");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let pokemonAtual = null;
let shiny = false;

const pokemons = [
  {nome:"Flamix", cor:"orange"},
  {nome:"Aquari", cor:"cyan"},
  {nome:"Leafy", cor:"lime"}
];

grass.onclick = () => {
  encounter.style.display = "block";

  pokemonAtual = pokemons[Math.floor(Math.random()*pokemons.length)];
  shiny = Math.random() < 0.1;

  info.innerText = pokemonAtual.nome + (shiny ? " ✨ SHINY!" : "");
};

function draw() {
  // fundo VISÍVEL (resolve tela preta)
  ctx.fillStyle = "#0a1a3a";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if (!pokemonAtual) return;

  let t = Date.now()*0.002;
  let y = Math.sin(t) * 20;
  let size = 80 + Math.sin(t*2)*10;

  ctx.save();
  ctx.translate(canvas.width/2, canvas.height/2 + y);

  if (shiny) {
    ctx.shadowBlur = 30;
    ctx.shadowColor = "yellow";
  }

  ctx.fillStyle = pokemonAtual.cor;
  ctx.beginPath();
  ctx.arc(0,0,size,0,Math.PI*2);
  ctx.fill();

  // olhos
  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(-20,-10,8,0,Math.PI*2);
  ctx.arc(20,-10,8,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

document.getElementById("ball").onclick = () => {
  if (!pokemonAtual) return;

  let chance = shiny ? 0.8 : 0.5;

  if (Math.random() < chance) {
    alert("Capturado!");
  } else {
    alert("Fugiu!");
  }

  pokemonAtual = null;
  encounter.style.display = "none";
};

function loop() {
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
