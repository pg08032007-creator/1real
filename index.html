<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Catch Game 2D</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: url("https://i.imgur.com/6Iej2c3.jpg") no-repeat center;
  background-size: cover;
  color: white;
}

/* topo */
#topo {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  background: rgba(0,0,0,0.4);
}

/* pokemon */
#pokemon {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 100px;
  animation: flutuar 2s infinite ease-in-out;
}

@keyframes flutuar {
  0% { transform: translate(-50%, -50%) translateY(0); }
  50% { transform: translate(-50%, -50%) translateY(-20px); }
  100% { transform: translate(-50%, -50%) translateY(0); }
}

/* circulo de captura */
#circulo {
  position: absolute;
  top: 40%;
  left: 50%;
  width: 150px;
  height: 150px;
  border: 3px solid lime;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: translate(-50%, -50%) scale(1); opacity:1; }
  50% { transform: translate(-50%, -50%) scale(0.7); opacity:0.5; }
  100% { transform: translate(-50%, -50%) scale(1); opacity:1; }
}

/* pokebola */
#pokeball {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 80px;
  background: linear-gradient(red 50%, white 50%);
  border-radius: 50%;
  border: 4px solid black;
  cursor: grab;
}

/* botão meio da pokebola */
#pokeball::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 20px;
  height: 20px;
  background: white;
  border: 3px solid black;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div id="topo">Flamix / CP 1234</div>

<div id="pokemon">🔥</div>
<div id="circulo"></div>

<div id="pokeball"></div>

<script>
const ball = document.getElementById("pokeball");
const pokemon = document.getElementById("pokemon");

let dragging = false;
let startX, startY;

ball.addEventListener("mousedown", (e) => {
  dragging = true;
  startX = e.clientX;
  startY = e.clientY;
  ball.style.cursor = "grabbing";
});

document.addEventListener("mouseup", (e) => {
  if (!dragging) return;
  dragging = false;

  let dx = e.clientX - startX;
  let dy = e.clientY - startY;

  lançar(dx, dy);
  ball.style.cursor = "grab";
});

function lançar(dx, dy) {
  let x = 0;
  let y = 0;

  let interval = setInterval(() => {
    x += dx * 0.02;
    y += dy * 0.02;

    ball.style.transform = `translate(${x}px, ${y}px)`;

    // colisão simples
    if (y < -300) {
      clearInterval(interval);

      if (Math.random() > 0.5) {
        alert("Capturado!");
      } else {
        alert("Fugiu!");
      }

      ball.style.transform = "translateX(-50%)";
    }
  }, 16);
}
</script>

</body>
</html>
