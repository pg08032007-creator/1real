<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Catch Game</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family: Arial;
  background: linear-gradient(#87CEEB, #4caf50);
}

/* 🌿 grama */
#grass {
  position:absolute;
  bottom:0;
  width:100%;
  height:150px;
  background: repeating-linear-gradient(
    45deg,
    #2e7d32,
    #2e7d32 10px,
    #388e3c 10px,
    #388e3c 20px
  );
  cursor:pointer;
}

/* tela de encontro */
#encounter {
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  background: radial-gradient(circle, #00000088, #000000);
}

/* pokebola */
#ball {
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:70px;
  border-radius:50%;
  background: linear-gradient(red 50%, white 50%);
  border:4px solid black;
  cursor:pointer;
}

#ball::after {
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:15px;
  height:15px;
  background:white;
  border:3px solid black;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

/* texto */
#info {
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  color:white;
  font-size:20px;
}
</style>
</head>

<body>

<div id="grass"></div>

<div id="encounter">
  <canvas id="canvas"></canvas>
  <div id="info"></div>
  <div id="ball"></div>
</div>

<script>
const grass = document.getElementById("grass");
const encounter = document.getElementById("encounter");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let pokemonAtual;
let shiny = false;
let y = 0;

// 🎲 lista de pokemons fake
const pokemons = [
  {nome:"Flamix", cor:"orange"},
  {nome:"Aquari", cor:"cyan"},
  {nome:"Leafy", cor:"lime"}
];

// 🌿 clicar na grama
grass.onclick = () => {
  encounter.style.display = "block";

  pokemonAtual = pokemons[Math.floor(Math.random()*pokemons.length)];

  // ✨ chance shiny (1/10)
  shiny = Math.random() < 0.1;

  document.getElementById("info").innerText =
    pokemonAtual.nome + (shiny ? " ✨ SHINY!" : "");
};

// 🎬 animação (fake 3D)
function drawPokemon() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let size = 80 + Math.sin(Date.now()*0.003)*10;

  ctx.save();
  ctx.translate(canvas.width/2, canvas.height/2 + y);

  // brilho shiny
  if (shiny) {
    ctx.shadowBlur = 30;
    ctx.shadowColor = "yellow";
  }

  // corpo
  ctx.fillStyle = pokemonAtual ? pokemonAtual.cor : "white";
  ctx.beginPath();
  ctx.arc(0,0,size,0,Math.PI*2);
  ctx.fill();

  // olho
  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(-20,-10,8,0,Math.PI*2);
  ctx.arc(20,-10,8,0,Math.PI*2);
  ctx.fill();

  ctx.restore();

  y = Math.sin(Date.now()*0.002)*20;
}

// 🔴 captura
document.getElementById("ball").onclick = () => {
  if (!pokemonAtual) return;

  let chance = shiny ? 0.8 : 0.5;

  if (Math.random() < chance) {
    alert("Capturado!");
  } else {
    alert("Fugiu!");
  }

  encounter.style.display = "none";
  pokemonAtual = null;
};

// loop
function loop() {
  if (pokemonAtual) drawPokemon();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
