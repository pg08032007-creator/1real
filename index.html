<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Pokemon Style</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
#btn {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: red;
  border: 4px solid white;
}
</style>
</head>
<body>

<div id="btn"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1a3a);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 1, 5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Luz
const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
scene.add(light);

// chão
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0x1f7a1f})
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -1;
scene.add(ground);

// 📦 carregar modelo 3D
let pokemon;

const loader = new THREE.GLTFLoader();
loader.load('dragon.glb', function(gltf){
  pokemon = gltf.scene;
  pokemon.scale.set(1.5,1.5,1.5);
  pokemon.position.y = 0;
  scene.add(pokemon);
});

// 🔴 pokebola
const ball = new THREE.Mesh(
  new THREE.SphereGeometry(0.3,32,32),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
ball.position.set(0,-1,2);
scene.add(ball);

let throwing = false;

document.getElementById("btn").onclick = () => {
  throwing = true;
};

function animate(){
  requestAnimationFrame(animate);

  if (pokemon) {
    pokemon.rotation.y += 0.01;
    pokemon.position.y = Math.sin(Date.now()*0.002)*0.2;
  }

  if (throwing) {
    ball.position.y += 0.1;
    ball.position.z -= 0.1;

    if (ball.position.y > 0) {
      throwing = false;
      ball.position.set(0,-1,2);
      alert("Tentativa!");
    }
  }

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
