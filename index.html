<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poke-Arceus 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui { 
            position: absolute; top: 10px; left: 10px; 
            color: white; background: rgba(0,0,0,0.7); 
            padding: 15px; border-radius: 8px; pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>Poke-Arceus Clone</b><br>
        • Use WASD ou Setas para mover<br>
        • Clique na tela para lançar Pokébola
    </div>

    <!-- Usando uma versão estável e direta do Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. CENA E CÂMERA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Céu Azul
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. ILUMINAÇÃO (Essencial para não ver tudo preto!)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

        // 3. CHÃO (GRAMADO)
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 4. JOGADOR (TREINADOR)
        const playerGeo = new THREE.BoxGeometry(1, 2, 1);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x3333ff });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 1;
        scene.add(player);

        // 5. POKÉMON (ALVO)
        const pokeGeo = new THREE.SphereGeometry(0.8, 16, 16);
        const pokeMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
        const pokemon = new THREE.Mesh(pokeGeo, pokeMat);
        pokemon.position.set(0, 0.8, -15);
        scene.add(pokemon);

        // 6. CONTROLES
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        const balls = [];

        // LANÇAR POKÉBOLA AO CLICAR
        window.addEventListener('mousedown', () => {
            const ballGeo = new THREE.SphereGeometry(0.3, 8, 8);
            const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const ball = new THREE.Mesh(ballGeo, ballMat);
            
            ball.position.copy(player.position);
            ball.userData.velocity = new THREE.Vector3(0, 0.2, -0.8); // Lança para frente
            
            scene.add(ball);
            balls.push(ball);
        });

        camera.position.set(0, 5, 10);

        // 7. LOOP DE RENDERIZAÇÃO
        function animate() {
            requestAnimationFrame(animate);

            // Movimentação
            if (keys['w'] || keys['arrowup']) player.position.z -= 0.2;
            if (keys['s'] || keys['arrowdown']) player.position.z += 0.2;
            if (keys['a'] || keys['arrowleft']) player.position.x -= 0.2;
            if (keys['d'] || keys['arrowright']) player.position.x += 0.2;

            // Câmera segue o jogador
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 10;
            camera.lookAt(player.position);

            // Lógica das Pokébolas
            balls.forEach((ball, index) => {
                ball.position.add(ball.userData.velocity);
                ball.userData.velocity.y -= 0.01; // Gravidade

                // Colisão com o Pokémon
                if (ball.position.distanceTo(pokemon.position) < 1.2) {
                    pokemon.material.color.set(0x00ff00); // Fica verde se capturar
                    scene.remove(ball);
                    balls.splice(index, 1);
                    console.log("Capturado!");
                }

                // Remove bolas que caem no chão
                if (ball.position.y < 0) {
                    scene.remove(ball);
                    balls.splice(index, 1);
                }
            });

            renderer.render(scene, camera);
        }

        // Ajuste automático de tela
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
