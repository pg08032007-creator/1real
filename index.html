<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poke-Arceus Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; user-select: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px 4px #000; z-index: 10; pointer-events: none; }
        
        /* Controles Mobile */
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 20; }
        .joystick-area { width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.5); }
        .btn-action { width: 80px; height: 80px; background: rgba(255,0,0,0.6); border-radius: 50%; border: 4px solid white; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); active { transform: scale(0.9); } }
        
        #pokedex-count { font-size: 24px; color: #ffeb3b; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="pokedex-count">Capturados: 0 / 150</div>
        <small>Arraste o lado esquerdo para mover | Botão vermelho para lançar</small>
    </div>

    <div class="controls">
        <div class="joystick-area" id="touch-move">MOVER</div>
        <div class="btn-action" id="btn-throw">LANÇAR</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let capturedCount = 0;
        const pokemons = [];
        const balls = [];
        const keys = {};

        // 1. CENA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 100); // Neblina para dar profundidade
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. LUZES
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(50, 50, 50);
        scene.add(sun);

        // 3. TERRENO COM TEXTURA SIMULADA
        const groundGeo = new THREE.PlaneGeometry(500, 500);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 4. JOGADOR (PERSONAGEM)
        const playerGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), new THREE.MeshStandardMaterial({color: 0x2196f3}));
        body.position.y = 1;
        playerGroup.add(body);
        scene.add(playerGroup);

        // 5. GERAR 150 POKÉMONS ALEATÓRIOS
        function spawnPokemons() {
            const colors = [0xff0000, 0xffff00, 0x00ff00, 0xff00ff, 0x00ffff, 0xffa500];
            for(let i=0; i<150; i++) {
                const poke = new THREE.Group();
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                // Corpo do "Pokémon"
                const body = new THREE.Mesh(
                    new THREE.SphereGeometry(Math.random() * 0.5 + 0.3, 16, 16),
                    new THREE.MeshStandardMaterial({ color: color })
                );
                poke.add(body);
                
                // Posição aleatória no mapa
                poke.position.set(
                    (Math.random() - 0.5) * 150,
                    0.5,
                    (Math.random() - 0.5) * 150
                );
                
                scene.add(poke);
                pokemons.push(poke);
            }
        }
        spawnPokemons();

        // 6. LANÇAR POKÉBOLA
        function throwBall() {
            const ball = new THREE.Mesh(
                new THREE.SphereGeometry(0.2, 12, 12),
                new THREE.MeshStandardMaterial({ color: 0xeeeeee })
            );
            ball.position.copy(playerGroup.position);
            ball.position.y += 1;
            
            // Direção baseada para onde o jogador está "olhando"
            const angle = playerGroup.rotation.y;
            ball.userData.velocity = new THREE.Vector3(
                -Math.sin(angle) * 0.8,
                0.3,
                -Math.cos(angle) * 0.8
            );
            
            scene.add(ball);
            balls.push(ball);
        }

        // 7. CONTROLES (TECLADO + BOTÃO)
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
        document.getElementById('btn-throw').addEventListener('click', throwBall);

        // Joystick Simples (Touch)
        let moveState = { x: 0, z: 0 };
        document.getElementById('touch-move').addEventListener('touchmove', (e) => {
            moveState.z = -1; // Move para frente ao tocar
        });
        document.getElementById('touch-move').addEventListener('touchend', () => {
            moveState.z = 0;
        });

        // 8. LOOP PRINCIPAL
        function animate() {
            requestAnimationFrame(animate);

            // Movimento Teclado
            if (keys['w']) playerGroup.position.z -= 0.3;
            if (keys['s']) playerGroup.position.z += 0.3;
            if (keys['a']) playerGroup.rotation.y += 0.05;
            if (keys['d']) playerGroup.rotation.y -= 0.05;

            // Movimento Touch
            playerGroup.position.z += moveState.z * 0.3;

            // Câmera (Terceira pessoa)
            const camOffset = new THREE.Vector3(0, 5, 10);
            camOffset.applyQuaternion(playerGroup.quaternion);
            camera.position.lerp(playerGroup.position.clone().add(camOffset), 0.1);
            camera.lookAt(playerGroup.position);

            // Lógica das Bolas
            balls.forEach((ball, bIdx) => {
                ball.position.add(ball.userData.velocity);
                ball.userData.velocity.y -= 0.015; // Gravidade

                // Colisão com Pokémons
                pokemons.forEach((poke, pIdx) => {
                    if (ball.position.distanceTo(poke.position) < 1.5) {
                        scene.remove(poke);
                        pokemons.splice(pIdx, 1);
                        scene.remove(ball);
                        balls.splice(bIdx, 1);
                        capturedCount++;
                        document.getElementById('pokedex-count').innerText = `Capturados: ${capturedCount} / 150`;
                    }
                });

                if (ball.position.y < -1) scene.remove(ball);
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
